<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Impressum -- Josef Schnell GmbH</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,wght@1,500;1,600&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#14161a;--ink-soft:#4b5058;--paper:#faf9f7;--card:#ffffff;
  --line:#e7e4de;--accent:#c2402a;--accent-dark:#a23422;--dark:#101216;
  --radius:20px;--radius-lg:28px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.6}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.container{max-width:1180px;margin:0 auto;padding:0 24px}
.kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}
h2{font-size:clamp(28px,4vw,44px);line-height:1.12;letter-spacing:-.02em;font-weight:700;margin-top:14px}
.section-sub{margin-top:16px;max-width:560px;color:var(--ink-soft);font-size:17px}
.accent{font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:600;color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:999px;font-weight:600;font-size:15px;transition:transform .18s ease,background .18s ease,box-shadow .18s ease}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 10px 24px rgba(194,64,42,.28)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-ghost{border:1px solid rgba(255,255,255,.45);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:#000}
header{position:sticky;top:0;z-index:40;background:rgba(250,249,247,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:76px}
.brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:17px;letter-spacing:-.01em}
.brand img{height:38px;width:auto}
.nav-links{display:none;gap:34px;font-size:15px;font-weight:500;color:var(--ink-soft)}
.nav-links a:hover{color:var(--ink)}
.nav-cta{display:flex;align-items:center;gap:18px}
.nav-phone{display:none;font-weight:600;font-size:15px}
.nav-phone:hover{color:var(--accent)}
.nav .btn{padding:11px 22px;font-size:14px}
@media(min-width:900px){.nav-links{display:flex}.nav-phone{display:inline}}
.hero{padding:18px}
.hero-inner{position:relative;border-radius:var(--radius-lg);overflow:hidden;min-height:min(78vh,760px);display:flex;align-items:flex-end;background:linear-gradient(155deg,#181b21 0%,#23272f 45%,#3a3f49 100%)}
.hero-inner::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.055) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
.hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,11,14,.82) 0%,rgba(10,11,14,.35) 55%,rgba(10,11,14,.25) 100%)}
.hero-content{position:relative;z-index:1;padding:clamp(32px,6vw,72px);color:#fff;max-width:820px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 18px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;background:rgba(255,255,255,.08)}
.hero h1{font-size:clamp(40px,7vw,84px);line-height:1.02;letter-spacing:-.03em;font-weight:800;margin-top:26px}
.hero p{margin-top:22px;font-size:clamp(16px,2vw,20px);color:rgba(255,255,255,.85);max-width:560px}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:34px}
section{padding:clamp(64px,9vw,120px) 0}
.values{border-bottom:1px solid var(--line);padding:clamp(40px,6vw,64px) 0}
.values-grid{display:grid;gap:32px}
@media(min-width:800px){.values-grid{grid-template-columns:repeat(3,1fr);gap:48px}}
.value h3{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.value h3::before{content:"";width:22px;height:2px;background:var(--accent);flex-shrink:0}
.value p{margin-top:10px;color:var(--ink-soft);font-size:15px}
.services-grid{display:grid;gap:18px;margin-top:52px}
@media(min-width:700px){.services-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1020px){.services-grid{grid-template-columns:repeat(3,1fr)}}
.service{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:30px 28px;transition:border-color .2s ease,transform .2s ease,box-shadow .2s ease}
.service:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 18px 40px rgba(20,22,26,.08)}
.service .num{font-family:'Fraunces',Georgia,serif;font-style:italic;color:var(--accent);font-size:15px;font-weight:600}
.service h3{font-size:19px;font-weight:700;margin-top:12px}
.service p{margin-top:10px;color:var(--ink-soft);font-size:15px}
.about{background:var(--dark);color:#fff;border-radius:var(--radius-lg);margin:0 18px}
.about .kicker{color:#e2b3a9}
.about-grid{display:grid;gap:44px;align-items:center}
@media(min-width:900px){.about-grid{grid-template-columns:1.05fr .95fr}}
.about p.body{margin-top:22px;font-size:17px;line-height:1.75;color:rgba(255,255,255,.82)}
.about-img{border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3}
.about-img img{width:100%;height:100%;object-fit:cover}
.steps-grid{display:grid;gap:16px;margin-top:52px}
@media(min-width:700px){.steps-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1020px){.steps-grid{grid-template-columns:repeat(3,1fr)}}
.step{border-top:1px solid var(--line);padding:26px 4px 8px}
.step .num{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:26px;color:var(--accent);font-weight:600}
.step h3{font-size:17px;font-weight:700;margin-top:8px}
.step p{margin-top:8px;color:var(--ink-soft);font-size:15px}
.cta{margin:0 18px;border-radius:var(--radius-lg);background:linear-gradient(140deg,var(--accent) 0%,var(--accent-dark) 100%);color:#fff;text-align:center;padding:clamp(56px,8vw,96px) 24px}
.cta h2{max-width:640px;margin-left:auto;margin-right:auto}
.cta p{margin:18px auto 0;max-width:480px;color:rgba(255,255,255,.88)}
.cta .btn{margin-top:32px;background:#fff;color:var(--accent-dark)}
.cta .phone-line{margin-top:22px;font-size:17px;font-weight:600}
.cta .phone-line a:hover{text-decoration:underline}
.contact-grid{display:grid;gap:18px;margin-top:52px}
@media(min-width:800px){.contact-grid{grid-template-columns:repeat(2,1fr)}}
.contact-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:34px;text-align:center}
.contact-card .label{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.contact-card .value-line{display:block;font-size:22px;font-weight:700;margin-top:12px;letter-spacing:-.01em}
.contact-card .value-line:hover{color:var(--accent)}
footer{background:var(--dark);color:rgba(255,255,255,.75);margin-top:clamp(64px,9vw,120px)}
.footer-inner{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between;padding:44px 0;font-size:14px}
.footer-inner .brand{color:#fff;font-size:15px}
.footer-inner a:hover{color:#fff}
[data-reveal]{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}
[data-reveal].is-visible{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}[data-reveal]{opacity:1;transform:none;transition:none}}
</style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="brand" href="index.html"><img src="https://josefschnell.de/wp-content/uploads/2024/03/logo_schnell.jpg" alt="Josef Schnell GmbH Logo" /><span>Josef Schnell GmbH</span></a>
      <div class="nav-cta">
        <a class="btn btn-primary" href="https://webjoyn.de/termin-buchen">Projekt anfragen</a>
      </div>
    </div>
  </header>
  <main>
    <section>
      <div class="container" style="max-width:760px">
        <a href="index.html" style="font-size:14px;color:var(--ink-soft)">&larr; Zurück zur Startseite</a>
        <span class="kicker" style="display:block;margin-top:32px">Rechtliches</span>
        <h2>Impressum</h2>
        <div style="margin-top:28px;white-space:pre-line;color:var(--ink-soft);font-size:16px;line-height:1.8">Kein Impressum-Text verfügbar -- bitte manuell ergänzen.</div>
      </div>
    </section>
  </main>
  <footer>
    <div class="container footer-inner">
      <span class="brand">Josef Schnell GmbH · Mannheim</span>
      <span>&copy; 2026 Josef Schnell GmbH · <a href="impressum.html">Impressum</a></span>
    </div>
  </footer>
</body>
</html>
